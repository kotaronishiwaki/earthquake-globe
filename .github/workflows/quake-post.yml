name: Auto-post M4.5+ earthquakes (Bluesky / Mastodon)

on:
  schedule:
    # 5分ごとに実行（GitHub Actionsの最小間隔）
    - cron: '*/5 * * * *'
  workflow_dispatch:   # 手動実行ボタンも有効化

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: none   # ファイルへの書き込み不要

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run quake-post
        env:
          # Bluesky（使う場合のみ設定。未設定ならスキップされます）
          BLUESKY_HANDLE:        ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD:  ${{ secrets.BLUESKY_APP_PASSWORD }}
          # Mastodon（使う場合のみ設定。未設定ならスキップされます）
          MASTODON_BASE_URL:     ${{ secrets.MASTODON_BASE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          # 共通設定
          SITE_URL:              ${{ vars.SITE_URL }}
          MIN_MAG:               ${{ vars.MIN_MAG }}
        run: node quake-post.js
        working-directory: scripts

