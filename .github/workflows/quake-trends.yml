name: Update earthquake trends (trends.json)

on:
  schedule:
    # 毎日 01:17 UTC（毎時0分の混雑を避ける）。過去比較なので1日1回で十分。
    - cron: '17 1 * * *'
  workflow_dispatch:   # 手動実行ボタン

jobs:
  trends:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # trends.json をリポジトリに書き戻すため

    concurrency:
      group: quake-trends
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate trends.json
        run: node quake-trends.js
        working-directory: scripts

      - name: Commit trends.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain trends.json)" ]; then
            git add trends.json
            git commit -m "chore: update trends.json [skip ci]"
            git push
          else
            echo "trends.json unchanged; nothing to commit."
          fi
