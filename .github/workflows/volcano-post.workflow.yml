# Move this file to .github/workflows/volcano-post.yml in your repository,
# then add the same secrets used by the quake poster.
name: Globe volcano auto-poster

on:
  schedule:
    - cron: '7,37 * * * *'   # twice an hour, offset from the quake job
  workflow_dispatch:           # manual "Run workflow" button
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'once'
        type: choice
        options:
          - once     # normal: post only new/changed alerts (default)
          - test     # post the single highest current alert NOW (verify posting works)
          - dry      # render cards to out/, post nothing
          - seed     # record current state without posting

permissions:
  contents: write              # to commit posted-volcanoes.json

concurrency:
  group: globe-volcano-autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        working-directory: auto-poster
        run: npm install
      - name: Install Chromium
        working-directory: auto-poster
        run: npx playwright install --with-deps chromium
      - name: Run
        working-directory: auto-poster
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_INSTANCE: ${{ secrets.MASTODON_BASE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          POST_BLUESKY: '1'
          POST_MASTODON: '1'
          MIN_JMA_LEVEL: '2'
          POST_AVIATION: 'YELLOW,ORANGE,RED'
          MAX_AGE_HOURS: '72'
        # schedule runs default to --once; the manual button uses the chosen mode
        run: node volcano-poster.mjs --${{ github.event.inputs.mode || 'once' }}
      - name: Persist posted-volcanoes.json
        run: |
          git config user.name "globe-bot"
          git config user.email "bot@users.noreply.github.com"
          git add auto-poster/posted-volcanoes.json || true
          git commit -m "state: update posted volcanoes [skip ci]" || echo "no changes"
          git push || echo "nothing to push"
