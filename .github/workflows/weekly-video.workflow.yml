name: Globe Weekly video
# Move this file to .github/workflows/weekly-video.yml to activate.

on:
  schedule:
    - cron: '0 21 * * 0'   # every Sunday 21:00 UTC (Mon 06:00 JST)
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install deps
        working-directory: video-poster
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Build the weekly videos (no upload)
        working-directory: video-poster
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-5
          TARGET_MINUTES: '5'
          MIN_MAG: '5.5'
          MIN_FLARE_CLASS: M1
          JMA_VOLCANO_URL: ${{ secrets.JMA_VOLCANO_URL }}
          BGM_FILE: assets/bed.wav
        run: node run.mjs

      # Reviewers download the MP4s from the run's Artifacts, watch them, then
      # publish by running the "Publish" job manually (or flip the private
      # YouTube uploads to public in YouTube Studio).
      - name: Upload videos as build artifacts (for review)
        uses: actions/upload-artifact@v4
        with:
          name: globe-weekly-videos
          path: |
            video-poster/out/Globe-Weekly-*.mp4
            video-poster/out/*.srt
          retention-days: 14

  # Optional: a separate, manually-triggered job that pushes the already-built
  # videos to YouTube as PRIVATE (still reviewed before going public).
  publish:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/download-artifact@v4
        with: { name: globe-weekly-videos, path: video-poster/out }
      - name: Upload to YouTube (private)
        working-directory: video-poster
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_PRIVACY: private
        run: |
          npm install googleapis
          node upload.mjs
