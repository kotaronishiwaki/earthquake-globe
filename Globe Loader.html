<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Globe — Earthquakes This Week</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f1eee8;
    --ocean: #f1eee8;
    --land: #2c2a27;
    --hair: #f1eee8;
    --ring: #2c2a27;
    --whirl: 44, 42, 39;
    --quake: 207, 79, 46;
    --ink: #2c2a27;
    --muted: #8c887f;
  }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    --globe: 440px;
    min-height: 100vh;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Helvetica Neue", "Noto Sans", "Noto Sans JP", "Noto Sans SC", "Noto Sans Arabic", "Noto Sans Devanagari", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .app { display: flex; align-items: flex-start; gap: 34px; }
  .main { display: flex; flex-direction: column; }
  .stage { position: relative; width: var(--globe); height: var(--globe); }
  .stage canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
  .stage canvas:active { cursor: grabbing; }

  /* ---- stats / controls column ---- */
  .stats { width: 152px; padding-top: 4px; user-select: none; }
  .metrics { display: block; }
  .stats .title { font-size: 13px; font-weight: 600; letter-spacing: .02em; margin: 0 0 2px; text-wrap: pretty; }
  .stats .sub { font-size: 10px; letter-spacing: .12em; color: var(--muted); margin: 0 0 14px; }
  .stat { margin-bottom: 13px; }
  .stat .k { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 1px; }
  .stat .v { font-size: 25px; font-weight: 600; line-height: 1.05; font-variant-numeric: tabular-nums; }
  .stat .v small { font-size: 13px; font-weight: 600; }

  .latest {
    display: block; width: 100%; text-align: inherit;
    margin: 0 0 16px; padding: 9px 11px;
    background: #fbfaf7; border: 1px solid rgba(207,79,46,.4);
    cursor: pointer; font-family: inherit; color: var(--ink);
  }
  .latest:hover { border-color: rgb(var(--quake)); box-shadow: 0 4px 16px -10px rgba(207,79,46,.7); }
  .latest .lk { display: flex; align-items: center; gap: 6px; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: rgb(var(--quake)); margin-bottom: 4px; }
  .latest .pdot { width: 7px; height: 7px; border-radius: 50%; background: rgb(var(--quake)); flex: none; box-shadow: 0 0 0 0 rgba(207,79,46,.5); animation: latestPulse 1.8s ease-out infinite; }
  @keyframes latestPulse { 0% { box-shadow: 0 0 0 0 rgba(207,79,46,.5); } 70%,100% { box-shadow: 0 0 0 6px rgba(207,79,46,0); } }
  .latest .lv { display: flex; align-items: baseline; gap: 6px; line-height: 1; }
  .latest .lv b { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; color: rgb(var(--quake)); }
  .latest .lsep { color: var(--muted); }
  .latest .lv #lat-ago { font-size: 11px; font-weight: 600; color: var(--muted); font-variant-numeric: tabular-nums; }
  .latest .lp { font-size: 10.5px; line-height: 1.3; color: var(--ink); margin-top: 4px; text-wrap: pretty; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .hint { margin-top: 4px; font-size: 10px; letter-spacing: .03em; color: var(--muted); display: flex; align-items: center; gap: 6px; text-wrap: pretty; }
  .hint .dot { width: 7px; height: 7px; border-radius: 50%; background: rgb(var(--quake)); flex: none; }

  .filter { margin-top: 16px; }
  .filter .k { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .fpills { display: flex; gap: 5px; }
  .fpill {
    font-size: 11px; padding: 4px 8px; border: 1px solid rgba(44,42,39,.18);
    background: none; color: var(--muted); cursor: pointer; font-family: inherit;
    line-height: 1; border-radius: 999px;
  }
  .fpill:hover { color: var(--ink); }
  .fpill.active { color: var(--bg); background: var(--ink); border-color: var(--ink); }

  /* ---- card ---- */
  .card {
    position: absolute; width: 200px; background: #fbfaf7;
    border: 1px solid rgba(44,42,39,.14);
    box-shadow: 0 8px 30px -12px rgba(44,42,39,.35);
    padding: 13px 14px 14px; opacity: 0; pointer-events: none; z-index: 5;
  }
  .card.show { opacity: 1; pointer-events: auto; }
  .card .close {
    position: absolute; top: 6px; right: 6px; width: 22px; height: 22px;
    border: none; background: none; cursor: pointer; color: var(--muted);
    font-size: 17px; line-height: 1; padding: 0;
  }
  .card .close:hover { color: var(--ink); }
  .card .mag { display: flex; align-items: baseline; gap: 7px; margin-bottom: 7px; }
  .card .mag b { font-size: 24px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; color: rgb(var(--quake)); }
  .card .mag span { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
  .card .place { font-size: 12.5px; line-height: 1.35; font-weight: 500; margin-bottom: 11px; text-wrap: pretty; padding-right: 14px; }
  .card .rows { display: grid; gap: 5px; }
  .card .rows div { display: flex; justify-content: space-between; gap: 10px; font-size: 11.5px; }
  .card .rows .k { color: var(--muted); }
  .card .rows .vv { font-weight: 600; font-variant-numeric: tabular-nums; text-align: end; }

  /* ---- timeline ---- */
  .timeline { margin-top: 22px; width: var(--globe); display: flex; align-items: center; gap: 11px; user-select: none; }
  .tbtn {
    width: 30px; height: 30px; border-radius: 50%; border: 1px solid rgba(44,42,39,.25);
    background: #fbfaf7; cursor: pointer; color: var(--ink); flex: none; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .tbtn:hover { border-color: var(--ink); }
  .tbtn svg { width: 11px; height: 11px; display: block; }
  #tl-range { flex: 1; -webkit-appearance: none; appearance: none; height: 2px; background: rgba(44,42,39,.2); outline: none; margin: 0; }
  #tl-range::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: rgb(var(--quake)); cursor: pointer; }
  #tl-range::-moz-range-thumb { width: 13px; height: 13px; border: none; border-radius: 50%; background: rgb(var(--quake)); cursor: pointer; }
  .tlabel { font-size: 10px; letter-spacing: .03em; color: var(--muted); min-width: 78px; text-align: right; font-variant-numeric: tabular-nums; flex: none; }

  /* ---- language bar ---- */
  .langbar { margin-top: 18px; width: var(--globe); display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
  .pill {
    font-size: 11px; padding: 4px 10px; border: 1px solid rgba(44,42,39,.18);
    border-radius: 999px; background: none; color: var(--muted); cursor: pointer;
    line-height: 1; font-family: inherit;
  }
  .pill:hover { color: var(--ink); }
  .pill.active { color: var(--bg); background: var(--ink); border-color: var(--ink); }

  /* ---- RTL ---- */
  [dir="rtl"] .stats { text-align: right; }
  [dir="rtl"] .hint { flex-direction: row-reverse; }
  [dir="rtl"] .filter .fpills { flex-direction: row-reverse; }
  [dir="rtl"] .card .close { left: 6px; right: auto; }
  [dir="rtl"] .card .place { padding-right: 0; padding-left: 14px; }
  [dir="rtl"] .tlabel { text-align: left; }

  /* ---- share ---- */
  .shead { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .iconbtn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(44,42,39,.22); background: #fbfaf7; cursor: pointer; color: var(--ink); padding: 0; flex: none; display: flex; align-items: center; justify-content: center; }
  .iconbtn:hover { border-color: var(--ink); }
  .iconbtn svg { width: 14px; height: 14px; display: block; }
  .cardfoot { margin-top: 12px; display: flex; }
  .share-c { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--ink); background: none; border: 1px solid rgba(44,42,39,.2); border-radius: 999px; padding: 5px 11px; cursor: pointer; font-family: inherit; }
  .share-c:hover { border-color: var(--ink); }
  .share-c svg { width: 12px; height: 12px; display: block; }
  .sharemenu { position: fixed; z-index: 20; background: #fbfaf7; border: 1px solid rgba(44,42,39,.16); box-shadow: 0 10px 34px -14px rgba(44,42,39,.45); padding: 5px; display: none; min-width: 150px; }
  .sharemenu.show { display: block; }
  .sharemenu button { display: flex; align-items: center; gap: 9px; width: 100%; background: none; border: none; padding: 8px 10px; font-size: 12px; color: var(--ink); cursor: pointer; font-family: inherit; text-align: start; }
  .sharemenu button:hover { background: rgba(44,42,39,.06); }
  .sharemenu svg { width: 14px; height: 14px; flex: none; }
  .toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%); background: var(--ink); color: var(--bg); font-size: 11.5px; letter-spacing: .02em; padding: 7px 14px; border-radius: 999px; opacity: 0; transition: opacity .2s ease; pointer-events: none; z-index: 21; }
  .toast.show { opacity: 1; }
  [dir="rtl"] .sharemenu button { text-align: right; }

  /* ---- support (buy me a coffee) ---- */
  .coffee { margin-top: 14px; align-self: center; display: inline-flex; align-items: center; gap: 7px; font-size: 11.5px; font-weight: 600; color: var(--ink); text-decoration: none; border: 1px solid rgba(44,42,39,.22); border-radius: 999px; padding: 6px 13px; background: #fbfaf7; font-family: inherit; }
  .coffee:hover { border-color: var(--ink); background: var(--ink); color: var(--bg); }
  .coffee svg { width: 14px; height: 14px; display: block; }

  /* ---- mobile ---- */
  @media (max-width: 720px) {
    body { --globe: min(92vw, 440px); align-items: stretch; padding: 18px 14px 26px; }
    .app { flex-direction: column; align-items: center; gap: 18px; width: 100%; }
    .stats { width: var(--globe); padding-top: 0; }
    .metrics { display: flex; align-items: flex-start; flex-wrap: wrap; gap: 16px 26px; }
    .metrics .stat { margin-bottom: 0; }
    .metrics .filter { margin-top: 0; }
    .main { width: var(--globe); align-items: center; }
    .timeline { margin-top: 16px; }
    .hint { margin-top: 12px; }
    [dir="rtl"] .metrics { flex-direction: row-reverse; }
  }
</style>
</head>
<body>
  <div class="app">
    <aside class="stats" id="stats">
      <div class="shead">
        <p class="title" id="t-title">過去7日間の地震</p>
        <button class="iconbtn" id="share-all" aria-label="共有"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"></line><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"></line></svg></button>
      </div>
      <p class="sub">USGS · M2.5+</p>
      <button class="latest" id="latest">
        <div class="lk"><span class="pdot"></span><span id="l-latest">最新</span></div>
        <div class="lv"><b id="lat-mag">—</b><span class="lsep">·</span><span id="lat-ago">—</span></div>
        <div class="lp" id="lat-place">—</div>
      </button>
      <div class="metrics">
        <div class="stat"><div class="k" id="l-count">件数</div><div class="v" id="s-count">—</div></div>
        <div class="stat"><div class="k" id="l-max">最大マグニチュード</div><div class="v" id="s-max">—</div></div>
        <div class="filter">
          <div class="k" id="l-filter">表示マグニチュード</div>
          <div class="fpills" id="fpills">
            <button class="fpill" data-min="2.5">M2.5+</button>
            <button class="fpill" data-min="4.5">M4.5+</button>
            <button class="fpill" data-min="6">M6+</button>
          </div>
        </div>
      </div>
      <div class="hint"><span class="dot"></span><span id="t-hint">震源をタップ／ドラッグで回転</span></div>
    </aside>

    <div class="main">
      <div class="stage">
        <canvas id="globe" width="440" height="440"></canvas>
        <div class="card" id="card">
          <button class="close" id="card-close" aria-label="閉じる">×</button>
          <div class="mag"><b id="c-mag">—</b><span id="l-mag">マグニチュード</span></div>
          <div class="place" id="c-place">—</div>
          <div class="rows">
            <div><span class="k" id="l-depth">深さ</span><span class="vv" id="c-depth">—</span></div>
            <div><span class="k" id="l-when">発生</span><span class="vv" id="c-ago">—</span></div>
            <div id="c-mmi-row" style="display:none"><span class="k" id="l-mmi">揺れ(MMI)</span><span class="vv" id="c-mmi">—</span></div>
            <div><span class="k" id="l-datetime">日時</span><span class="vv" id="c-time">—</span></div>
          </div>
          <div class="cardfoot">
            <button class="share-c" id="share-q"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"></line><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"></line></svg><span id="l-share">共有</span></button>
          </div>
        </div>
      </div>

      <div class="timeline" id="timeline">
        <button class="tbtn" id="tl-play" aria-label="再生"></button>
        <input type="range" id="tl-range" min="0" max="1000" value="1000" aria-label="timeline" />
        <div class="tlabel" id="tl-label">ライブ</div>
      </div>

      <div class="langbar" id="langbar"></div>

      <a class="coffee" id="coffee" href="https://buymeacoffee.com/globelabo" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h13v4a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5V9Z"></path><path d="M17 10h2.5a2.5 2.5 0 0 1 0 5H17"></path><line x1="7" y1="3" x2="7" y2="5.5"></line><line x1="10.5" y1="3" x2="10.5" y2="5.5"></line><line x1="14" y1="3" x2="14" y2="5.5"></line></svg>
        <span id="l-support">コーヒーを一杯</span>
      </a>
    </div>
  </div>

  <div class="sharemenu" id="sharemenu">
    <button id="sm-copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"></path><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"></path></svg><span id="l-copy">リンクをコピー</span></button>
    <button id="sm-x"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.66l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.45-6.231Zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77Z"></path></svg><span id="l-postx">Xに投稿</span></button>
  </div>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script>
  (function () {
    // ---------- i18n ----------
    const TR = {
      en: { name:"English", dir:"ltr", locale:"en-US",
        title:"Earthquakes · past 7 days", count:"Total events", max:"Largest magnitude",
        hint:"Tap a point · drag to rotate", mag:"Magnitude", depth:"Depth", when:"When",
        mmi:"Shaking (MMI)", datetime:"Date & time", close:"Close", unit:"",
        latest:"Latest", filter:"Show magnitude", live:"Live", play:"Play", pause:"Pause",
        min:"%n min ago", hour:"%n hr ago", day:"%n days ago" },
      zh: { name:"中文", dir:"ltr", locale:"zh-CN",
        title:"过去 7 天的地震", count:"地震次数", max:"最大震级",
        hint:"点按震源 · 拖动旋转", mag:"震级", depth:"深度", when:"发生",
        mmi:"震动 (MMI)", datetime:"日期时间", close:"关闭", unit:"次",
        latest:"最新", filter:"显示震级", live:"实时", play:"播放", pause:"暂停",
        min:"%n 分钟前", hour:"%n 小时前", day:"%n 天前" },
      hi: { name:"हिन्दी", dir:"ltr", locale:"hi-IN",
        title:"पिछले 7 दिनों के भूकंप", count:"कुल भूकंप", max:"अधिकतम तीव्रता",
        hint:"केंद्र पर टैप करें · घुमाने के लिए खींचें", mag:"तीव्रता", depth:"गहराई", when:"कब",
        mmi:"कंपन (MMI)", datetime:"दिनांक व समय", close:"बंद करें", unit:"",
        latest:"नवीनतम", filter:"तीव्रता दिखाएँ", live:"लाइव", play:"चलाएँ", pause:"रोकें",
        min:"%n मिनट पहले", hour:"%n घंटे पहले", day:"%n दिन पहले" },
      es: { name:"Español", dir:"ltr", locale:"es-ES",
        title:"Sismos · últimos 7 días", count:"Eventos totales", max:"Magnitud máxima",

        mmi:"Sacudida (MMI)", datetime:"Fecha y hora", close:"Cerrar", unit:"",
        latest:"Más reciente", filter:"Mostrar magnitud", live:"En vivo", play:"Reproducir", pause:"Pausar",
        min:"hace %n min", hour:"hace %n h", day:"hace %n días" },
      ar: { name:"العربية", dir:"rtl", locale:"ar",
        title:"الزلازل · آخر 7 أيام", count:"إجمالي الزلازل", max:"أكبر قوة",
        hint:"انقر على نقطة · اسحب للتدوير", mag:"القوة", depth:"العمق", when:"متى",
        mmi:"الاهتزاز (MMI)", datetime:"التاريخ والوقت", close:"إغلاق", unit:"",
        latest:"الأحدث", filter:"إظهار القوة", live:"مباشر", play:"تشغيل", pause:"إيقاف",
        min:"منذ %n دقيقة", hour:"منذ %n ساعة", day:"منذ %n يوم" },
      ja: { name:"日本語", dir:"ltr", locale:"ja-JP",
        title:"過去7日間の地震", count:"件数", max:"最大マグニチュード",
        hint:"震源をタップ · ドラッグで回転", mag:"マグニチュード", depth:"深さ", when:"発生",
        mmi:"揺れ(MMI)", datetime:"日時", close:"閉じる", unit:"件",
        latest:"最新", filter:"表示マグニチュード", live:"ライブ", play:"再生", pause:"一時停止",
        min:"%n分前", hour:"%n時間前", day:"%n日前" },
    };
    const ORDER = ["en", "zh", "hi", "es", "ar", "ja"];
    const SHARE = {
      en: { share:"Share", copy:"Copy link", postX:"Post on X", copied:"Link copied", smsg:"M%m earthquake · %p — live 7-day quake map" },
      zh: { share:"分享", copy:"复制链接", postX:"发布到 X", copied:"链接已复制", smsg:"M%m 地震 · %p — 过去7天地震地图" },
      hi: { share:"साझा करें", copy:"लिंक कॉपी करें", postX:"X पर पोस्ट करें", copied:"लिंक कॉपी हुई", smsg:"M%m भूकंप · %p — पिछले 7 दिनों का भूकंप मानचित्र" },
      es: { share:"Compartir", copy:"Copiar enlace", postX:"Publicar en X", copied:"Enlace copiado", smsg:"Sismo M%m · %p — mapa sísmico de 7 días" },
      ar: { share:"مشاركة", copy:"نسخ الرابط", postX:"النشر على X", copied:"تم نسخ الرابط", smsg:"زلزال بقوة M%m · %p — خريطة الزلازل لآخر 7 أيام" },
      ja: { share:"共有", copy:"リンクをコピー", postX:"Xに投稿", copied:"リンクをコピーしました", smsg:"M%m の地震 · %p ｜過去7日間の地震マップ" },
    };
    let lang = localStorage.getItem("globe-lang") || "ja";
    if (!TR[lang]) lang = "ja";
    let T = TR[lang];
    let S = SHARE[lang];
    const SUPPORT = { en:"Buy me a coffee", zh:"请我喝杯咖啡", hi:"मुझे कॉफ़ी पिलाएँ", es:"Invítame un café", ar:"ادعمني بقهوة", ja:"コーヒーを一杯" };

    const PLAY_SVG = '<svg viewBox="0 0 10 10"><path d="M2 1 L9 5 L2 9 Z" fill="currentColor"/></svg>';
    const PAUSE_SVG = '<svg viewBox="0 0 10 10"><rect x="2" y="1.5" width="2.2" height="7" fill="currentColor"/><rect x="5.8" y="1.5" width="2.2" height="7" fill="currentColor"/></svg>';

    // ---------- globe ----------
    const SIZE = 440, C = SIZE / 2, R = 152;
    const canvas = document.getElementById('globe');
    const ctx = canvas.getContext('2d');
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    canvas.width = SIZE * dpr; canvas.height = SIZE * dpr; ctx.scale(dpr, dpr);

    const style = getComputedStyle(document.documentElement);
    const col = n => style.getPropertyValue(n).trim();
    const COL = { land: col('--land'), hair: col('--hair'), ring: col('--ring'), ocean: col('--ocean'), whirl: col('--whirl'), quake: col('--quake') };

    const TILT = -18;
    const projection = d3.geoOrthographic().scale(R).translate([C, C]).clipAngle(90).rotate([0, -TILT, 0]);
    const path = d3.geoPath(projection, ctx);
    const graticule = d3.geoGraticule10();
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

    let land = null, borders = null, quakes = [];
    let selected = -1, paused = false;
    let stat = null, latestIdx = -1;

    // view state
    let rotX = 0, rotY = TILT, zoom = 1;
    let flying = false, flyT = 0, flyFrom = null, flyTarget = null, flyPendSelect = null;
    let inertia = false, momentum = 0;

    // filter + timeline
    let minMag = 2.5;
    let scrub = 1, playing = false;
    let dataMin = 0, dataMax = 0, RECENT = 6 * 3600e3;

    const WHIRL = { A: R * 1.34, B: R * 0.5, tilt: -20 * Math.PI / 180, dots: 54, gap: 0.05, headR: 3.0, tailR: 0.6, headO: 0.5 };
    const ct = Math.cos(WHIRL.tilt), st = Math.sin(WHIRL.tilt);
    function whirlPoint(a) {
      const ox = WHIRL.A * Math.cos(a), oy = WHIRL.B * Math.sin(a);
      return { x: C + ox * ct - oy * st, y: C + ox * st + oy * ct, front: Math.sin(a) >= 0 };
    }
    function drawWhirl(phase, wantFront) {
      for (let i = 0; i < WHIRL.dots; i++) {
        const f = i / (WHIRL.dots - 1);
        const p = whirlPoint(phase - i * WHIRL.gap);
        if (p.front !== wantFront) continue;
        const r = WHIRL.headR + (WHIRL.tailR - WHIRL.headR) * f;
        const o = WHIRL.headO * (1 - f) * (1 - f);
        if (o <= 0.002) continue;
        ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(' + COL.whirl + ',' + o.toFixed(3) + ')'; ctx.fill();
      }
    }

    const magDot = m => Math.max(1.6, Math.min(8, 1.6 + (m - 2.5) * 0.95));

    function cutoff() { return (scrub >= 0.999 && !playing) ? Infinity : dataMin + (dataMax - dataMin) * scrub; }
    function isLive() { return scrub >= 0.999 && !playing; }

    function clipDisc() { ctx.beginPath(); ctx.arc(C, C, R, 0, Math.PI * 2); ctx.clip(); }

    function drawQuakes(tSec) {
      if (!quakes.length) return;
      const cut = cutoff(), live = isLive();
      const rot = projection.rotate(), cen = [-rot[0], -rot[1]];
      let vLatest = -1, vLatestT = -Infinity;

      for (let i = 0; i < quakes.length; i++) {
        const q = quakes[i];
        if (q.mag < minMag || q.time > cut) { q._vis = false; continue; }
        q._vis = true;
        if (q.time > vLatestT) { vLatestT = q.time; vLatest = i; }
        const dist = d3.geoDistance(q.coords, cen);
        if (dist >= Math.PI / 2) continue;
        const p = projection(q.coords);
        if (!p) continue;
        q._sx = p[0]; q._sy = p[1];
        const edge = Math.min(1, (Math.PI / 2 - dist) / 0.32);
        const fresh = live ? 0 : clamp(1 - (cut - q.time) / RECENT, 0, 1);
        const dotR = magDot(q.mag) * (1 + 0.55 * fresh);

        const ph = ((tSec / 2.6) + q.phase) % 1;
        const ripR = dotR + ph * (dotR * 2.4 + q.mag * 2.2);
        const ripO = (1 - ph) * 0.5 * edge;
        if (ripO > 0.01) {
          ctx.beginPath(); ctx.arc(p[0], p[1], ripR, 0, Math.PI * 2);
          ctx.lineWidth = 1.4; ctx.strokeStyle = 'rgba(' + COL.quake + ',' + ripO.toFixed(3) + ')'; ctx.stroke();
        }
        if (fresh > 0.02) {
          ctx.beginPath(); ctx.arc(p[0], p[1], dotR + fresh * 10, 0, Math.PI * 2);
          ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(' + COL.quake + ',' + (fresh * 0.6 * edge).toFixed(3) + ')'; ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(p[0], p[1], dotR, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(' + COL.quake + ',' + (0.92 * edge).toFixed(3) + ')'; ctx.fill();
        ctx.beginPath(); ctx.arc(p[0], p[1], dotR + 1.1, 0, Math.PI * 2);
        ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(241,238,232,' + (0.55 * edge).toFixed(3) + ')'; ctx.stroke();
      }

      // most-recent (within current filter/timeline) — distinct beacon
      if (vLatest >= 0) {
        const q = quakes[vLatest];
        if (d3.geoDistance(q.coords, cen) < Math.PI / 2) {
          const p = projection(q.coords);
          if (p) {
            const dotR = magDot(q.mag);
            for (let j = 0; j < 2; j++) {
              const ph = ((tSec / 1.5) + j * 0.5) % 1;
              ctx.beginPath(); ctx.arc(p[0], p[1], dotR + 2 + ph * 17, 0, Math.PI * 2);
              ctx.lineWidth = 1.6; ctx.strokeStyle = 'rgba(' + COL.quake + ',' + ((1 - ph) * 0.55).toFixed(3) + ')'; ctx.stroke();
            }
            ctx.beginPath(); ctx.arc(p[0], p[1], dotR + 2.6, 0, Math.PI * 2);
            ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(241,238,232,0.95)'; ctx.stroke();
            ctx.beginPath(); ctx.arc(p[0], p[1], dotR + 1, 0, Math.PI * 2);
            ctx.fillStyle = 'rgb(' + COL.quake + ')'; ctx.fill();
            ctx.beginPath(); ctx.arc(p[0], p[1], dotR + 4.6, 0, Math.PI * 2);
            ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(' + COL.quake + ',0.9)'; ctx.stroke();
          }
        }
      }
      if (vLatest !== latestIdx) { latestIdx = vLatest; renderLatest(); }

      // selection
      if (selected >= 0 && quakes[selected] && quakes[selected]._vis) {
        const q = quakes[selected];
        if (d3.geoDistance(q.coords, cen) < Math.PI / 2) {
          const p = projection(q.coords);
          if (p) {
            const pulse = magDot(q.mag) + 6 + 3 * (0.5 + 0.5 * Math.sin(tSec * 3.2));
            ctx.beginPath(); ctx.arc(p[0], p[1], pulse, 0, Math.PI * 2);
            ctx.lineWidth = 1.6; ctx.strokeStyle = 'rgba(' + COL.quake + ',0.9)'; ctx.stroke();
            ctx.strokeStyle = 'rgba(' + COL.quake + ',0.5)'; ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(p[0] - pulse - 4, p[1]); ctx.lineTo(p[0] - pulse, p[1]);
            ctx.moveTo(p[0] + pulse, p[1]); ctx.lineTo(p[0] + pulse + 4, p[1]);
            ctx.stroke();
          }
        }
      }
    }

    function draw(rx, ry, phase, tSec) {
      projection.rotate([rx, ry, 0]).scale(R * zoom);
      ctx.clearRect(0, 0, SIZE, SIZE);
      drawWhirl(phase, false);

      ctx.save(); clipDisc();
      ctx.beginPath(); ctx.arc(C, C, R, 0, Math.PI * 2); ctx.fillStyle = COL.ocean; ctx.fill();
      if (land) {
        ctx.beginPath(); path(land); ctx.fillStyle = COL.land; ctx.fill();
        ctx.beginPath(); path(graticule); ctx.lineWidth = 0.5; ctx.strokeStyle = 'rgba(44,42,39,0.12)'; ctx.stroke();
        ctx.beginPath(); path(borders); ctx.lineWidth = 0.7; ctx.strokeStyle = COL.hair; ctx.stroke();
      }
      ctx.restore();

      ctx.beginPath(); ctx.arc(C, C, R, 0, Math.PI * 2); ctx.lineWidth = 1.3; ctx.strokeStyle = COL.ring; ctx.stroke();
      drawWhirl(phase, true);

      ctx.save(); clipDisc();
      drawQuakes(tSec);
      ctx.restore();
    }

    let phase = 0, last = performance.now(), t0 = last;
    const easeInOut = e => e < 0.5 ? 4 * e * e * e : 1 - Math.pow(-2 * e + 2, 3) / 2;
    function frame(now) {
      const dt = Math.min(48, now - last); last = now;
      if (playing) {
        scrub += dt / 14000;
        if (scrub >= 1) { scrub = 1; playing = false; updatePlay(); }
        rangeEl.value = scrub * 1000;
        updateTLabel();
      }
      if (flying) {
        flyT += dt;
        const e = Math.min(1, flyT / 900), k = easeInOut(e);
        rotX = flyFrom.x + (flyTarget.x - flyFrom.x) * k;
        rotY = flyFrom.y + (flyTarget.y - flyFrom.y) * k;
        if (e >= 1) { flying = false; endFly(); }
      } else if (inertia) {
        rotX += momentum * dt;
        momentum *= Math.pow(0.94, dt / 16);
        if (Math.abs(momentum) < 0.003) { inertia = false; paused = false; }
      } else if (!paused) {
        rotX += dt * 0.012;
        rotY += (TILT - rotY) * Math.min(1, dt * 0.0015);
      }
      phase += dt * 0.0038;
      draw(rotX, rotY, phase, (now - t0) / 1000);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    function flyTo(coords, sel) {
      flyFrom = { x: rotX, y: rotY };
      let tx = -coords[0];
      while (tx - rotX > 180) tx -= 360;
      while (tx - rotX < -180) tx += 360;
      flyTarget = { x: tx, y: Math.max(-70, Math.min(70, -coords[1])) };
      flyT = 0; flying = true; paused = true; inertia = false;
      flyPendSelect = (sel == null ? null : sel);
    }
    function endFly() {
      if (flyPendSelect != null) { showCard(flyPendSelect); paused = true; }
      else { paused = false; }
      flyPendSelect = null;
    }

    // ---------- data ----------
    fetch('https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-110m.json')
      .then(r => r.json())
      .then(world => {
        land = topojson.merge(world, world.objects.countries.geometries);
        borders = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);
      }).catch(() => {});

    fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_week.geojson')
      .then(r => r.json())
      .then(gj => {
        quakes = (gj.features || []).map((f, i) => ({
          coords: [f.geometry.coordinates[0], f.geometry.coordinates[1]],
          depth: f.geometry.coordinates[2],
          mag: f.properties.mag || 2.5,
          place: f.properties.place || '',
          time: f.properties.time,
          mmi: f.properties.mmi,
          id: f.id || ('q' + i),
          phase: (i * 0.61803398875) % 1,
        })).sort((a, b) => a.mag - b.mag);
        stat = {
          count: quakes.length,
          max: quakes.length ? quakes[quakes.length - 1].mag : 0,
        };
        dataMin = Math.min.apply(null, quakes.map(q => q.time));
        dataMax = Math.max.apply(null, quakes.map(q => q.time));
        RECENT = Math.max(4 * 3600e3, (dataMax - dataMin) * 0.03);
        renderStats();
        const overall = quakes.reduce((m, q, i) => (q.time > quakes[m].time ? i : m), 0);
        latestIdx = overall; renderLatest();
        // deep-link: #eq=<usgs id> opens that quake
        const hm = (location.hash || '').match(/eq=([^&]+)/);
        let target = overall, sel = null;
        if (hm) {
          const j = quakes.findIndex(q => q.id === decodeURIComponent(hm[1]));
          if (j >= 0) { target = j; sel = j; }
        }
        if (quakes[target]) flyTo(quakes[target].coords, sel);
      }).catch(() => {});

    // ---------- text ----------
    const $ = id => document.getElementById(id);
    function num(n) { try { return n.toLocaleString(T.locale); } catch (e) { return String(n); } }
    function withUnit(n) { return num(n) + (T.unit ? ' <small>' + T.unit + '</small>' : ''); }

    function renderStats() {
      if (!stat) return;
      $('s-count').innerHTML = withUnit(stat.count);
      $('s-max').textContent = 'M' + stat.max.toFixed(1);
    }
    function renderLatest() {
      if (latestIdx < 0 || !quakes[latestIdx]) {
        $('lat-mag').textContent = '—'; $('lat-ago').textContent = '—'; $('lat-place').textContent = '—';
        return;
      }
      const q = quakes[latestIdx];
      $('lat-mag').textContent = 'M' + q.mag.toFixed(1);
      $('lat-ago').textContent = agoText(q.time);
      $('lat-place').textContent = q.place || '—';
    }
    function agoText(ms) {
      const s = (Date.now() - ms) / 1000;
      let key, n;
      if (s < 3600) { key = 'min'; n = Math.max(1, Math.floor(s / 60)); }
      else if (s < 86400) { key = 'hour'; n = Math.floor(s / 3600); }
      else { key = 'day'; n = Math.floor(s / 86400); }
      return T[key].replace('%n', num(n));
    }
    function fmtTime(ms) {
      try { return new Date(ms).toLocaleString(T.locale, { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }); }
      catch (e) { return new Date(ms).toLocaleString(); }
    }
    let lastTLabel = '';
    function updateTLabel() {
      const txt = isLive() ? T.live : fmtTime(cutoff());
      if (txt !== lastTLabel) { $('tl-label').textContent = txt; lastTLabel = txt; }
    }
    function updatePlay() { $('tl-play').innerHTML = playing ? PAUSE_SVG : PLAY_SVG; $('tl-play').setAttribute('aria-label', playing ? T.pause : T.play); }

    function applyStaticText() {
      $('t-title').textContent = T.title;
      $('l-count').textContent = T.count;
      $('l-max').textContent = T.max;
      $('t-hint').textContent = T.hint;
      $('l-latest').textContent = T.latest;
      $('l-filter').textContent = T.filter;
      $('l-mag').textContent = T.mag;
      $('l-depth').textContent = T.depth;
      $('l-when').textContent = T.when;
      $('l-mmi').textContent = T.mmi;
      $('l-datetime').textContent = T.datetime;
      $('card-close').setAttribute('aria-label', T.close);
      $('l-share').textContent = S.share;
      $('l-copy').textContent = S.copy;
      $('l-postx').textContent = S.postX;
      $('l-support').textContent = SUPPORT[lang] || SUPPORT.en;
      $('share-all').setAttribute('aria-label', S.share);
      lastTLabel = ''; updateTLabel(); updatePlay();
    }

    // ---------- card ----------
    const card = $('card');
    function renderCard() {
      if (selected < 0) return;
      const q = quakes[selected];
      $('c-mag').textContent = 'M' + q.mag.toFixed(1);
      $('c-place').textContent = q.place || '—';
      $('c-depth').textContent = (q.depth != null ? num(Math.round(q.depth)) : '—') + ' km';
      $('c-ago').textContent = agoText(q.time);
      $('c-time').textContent = fmtTime(q.time);
      const mmiRow = $('c-mmi-row');
      if (q.mmi != null) { mmiRow.style.display = 'flex'; $('c-mmi').textContent = q.mmi.toFixed(1); }
      else mmiRow.style.display = 'none';
    }
    function positionCard() {
      const q = quakes[selected];
      const dispW = canvas.clientWidth || SIZE, dispH = canvas.clientHeight || SIZE;
      const s = dispW / SIZE;
      const cw = card.offsetWidth || 200, chh = card.offsetHeight || 150;
      const px = (q._sx != null ? q._sx : C) * s, py = (q._sy != null ? q._sy : C) * s;
      let left = px + 16, top = py - 20;
      if (left + cw > dispW) left = px - cw - 16;
      left = Math.max(0, Math.min(left, dispW - cw));
      top = Math.max(0, Math.min(top, dispH - chh));
      card.style.left = left + 'px'; card.style.top = top + 'px';
    }
    function showCard(i) { selected = i; renderCard(); positionCard(); card.classList.add('show'); }
    function hideCard() { card.classList.remove('show'); }

    function pick(mx, my) {
      const rot = projection.rotate(), cen = [-rot[0], -rot[1]];
      let best = -1, bd = 1e9;
      for (let i = 0; i < quakes.length; i++) {
        const q = quakes[i];
        if (q.mag < minMag || q.time > cutoff()) continue;
        if (d3.geoDistance(q.coords, cen) >= Math.PI / 2) continue;
        const p = projection(q.coords); if (!p) continue;
        const d = Math.hypot(p[0] - mx, p[1] - my);
        const thr = Math.max(12, magDot(q.mag) + 8);
        if (d < thr && d < bd) { bd = d; best = i; }
      }
      return best;
    }
    function toLocal(e) {
      const rect = canvas.getBoundingClientRect();
      return [ (e.clientX - rect.left) * (SIZE / rect.width), (e.clientY - rect.top) * (SIZE / rect.height) ];
    }

    // ---------- pointer: drag / pinch / tap ----------
    const ptrs = new Map();
    let dragging = false, downX = 0, downY = 0, downT = 0, startRot = null, vX = 0, lastMoveX = 0, lastMoveT = 0;
    let pinchD0 = 0, pinchZ0 = 1;

    canvas.addEventListener('pointerdown', e => {
      canvas.setPointerCapture(e.pointerId);
      ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (ptrs.size === 1) {
        downX = e.clientX; downY = e.clientY; downT = performance.now();
        startRot = { x: rotX, y: rotY }; dragging = false; inertia = false; momentum = 0; flying = false;
        vX = 0; lastMoveX = e.clientX; lastMoveT = downT;
      } else if (ptrs.size === 2) {
        const a = [...ptrs.values()];
        pinchD0 = Math.hypot(a[0].x - a[1].x, a[0].y - a[1].y); pinchZ0 = zoom; dragging = false;
      }
    });
    canvas.addEventListener('pointermove', e => {
      if (!ptrs.has(e.pointerId)) {
        if (ptrs.size === 0) { const [mx, my] = toLocal(e); canvas.style.cursor = pick(mx, my) >= 0 ? 'pointer' : 'grab'; }
        return;
      }
      ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (ptrs.size >= 2) {
        const a = [...ptrs.values()];
        const d = Math.hypot(a[0].x - a[1].x, a[0].y - a[1].y);
        if (pinchD0 > 0) zoom = clamp(pinchZ0 * d / pinchD0, 1, 2.8);
        return;
      }
      const dx = e.clientX - downX, dy = e.clientY - downY;
      if (!dragging && Math.hypot(dx, dy) > 4) {
        dragging = true; paused = true;
        if (selected >= 0) { selected = -1; hideCard(); }
      }
      if (dragging) {
        const k = 0.34 / zoom;
        rotX = startRot.x + dx * k;
        rotY = clamp(startRot.y - dy * k, -85, 85);
        const tn = performance.now();
        if (tn > lastMoveT) { vX = (e.clientX - lastMoveX) * k / (tn - lastMoveT); lastMoveX = e.clientX; lastMoveT = tn; }
      }
    });
    function endPtr(e) {
      if (ptrs.has(e.pointerId)) ptrs.delete(e.pointerId);
      try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
      if (ptrs.size === 0) {
        if (dragging) {
          momentum = vX; inertia = Math.abs(momentum) > 0.004;
          if (!inertia) paused = false;
          dragging = false;
        } else {
          const [mx, my] = toLocal(e); const i = pick(mx, my);
          if (i >= 0) { paused = true; showCard(i); }
          else { selected = -1; paused = false; hideCard(); }
        }
      } else if (ptrs.size === 1) {
        const rem = [...ptrs.entries()][0];
        downX = rem[1].x; downY = rem[1].y; startRot = { x: rotX, y: rotY };
        dragging = false; downT = performance.now(); lastMoveX = rem[1].x; lastMoveT = downT; vX = 0;
      }
    }
    canvas.addEventListener('pointerup', endPtr);
    canvas.addEventListener('pointercancel', endPtr);
    canvas.addEventListener('wheel', e => { e.preventDefault(); zoom = clamp(zoom * (1 - e.deltaY * 0.0012), 1, 2.8); }, { passive: false });

    $('card-close').addEventListener('click', () => { selected = -1; paused = false; hideCard(); });
    $('latest').addEventListener('click', () => { if (latestIdx >= 0) flyTo(quakes[latestIdx].coords, latestIdx); });

    // ---------- share ----------
    const shareMenu = $('sharemenu');
    let shareCtx = { text: '', url: '' };
    function baseURL() {
      return (location.origin && location.origin !== 'null')
        ? location.origin + location.pathname
        : location.href.split('#')[0];
    }
    function shareURL(i) {
      return (i >= 0 && quakes[i] && quakes[i].id) ? baseURL() + '#eq=' + encodeURIComponent(quakes[i].id) : baseURL();
    }
    function shareText(i) {
      if (i >= 0 && quakes[i]) return S.smsg.replace('%m', quakes[i].mag.toFixed(1)).replace('%p', quakes[i].place || '');
      return T.title;
    }
    async function startShare(i, anchor) {
      const url = shareURL(i), text = shareText(i);
      if (navigator.share) {
        try { await navigator.share({ title: T.title, text, url }); return; }
        catch (e) { if (e && e.name === 'AbortError') return; }
      }
      shareCtx = { text, url };
      const r = anchor.getBoundingClientRect();
      shareMenu.style.left = Math.max(8, Math.min(r.left, window.innerWidth - 168)) + 'px';
      shareMenu.style.top = (r.bottom + 6) + 'px';
      shareMenu.classList.add('show');
    }
    function hideShareMenu() { shareMenu.classList.remove('show'); }
    let toastT;
    function toast(msg) {
      const t = $('toast'); t.textContent = msg; t.classList.add('show');
      clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('show'), 1700);
    }
    $('share-all').addEventListener('click', e => { e.stopPropagation(); startShare(-1, e.currentTarget); });
    $('share-q').addEventListener('click', e => { e.stopPropagation(); startShare(selected, e.currentTarget); });
    $('sm-copy').addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(shareCtx.url); toast(S.copied); }
      catch (e) { window.prompt(S.copy, shareCtx.url); }
      hideShareMenu();
    });
    $('sm-x').addEventListener('click', () => {
      const u = 'https://x.com/intent/tweet?text=' + encodeURIComponent(shareCtx.text) + '&url=' + encodeURIComponent(shareCtx.url);
      window.open(u, '_blank', 'noopener'); hideShareMenu();
    });
    document.addEventListener('pointerdown', e => {
      if (shareMenu.classList.contains('show') && !shareMenu.contains(e.target)) hideShareMenu();
    }, true);

    // ---------- filter ----------
    [...document.querySelectorAll('.fpill')].forEach(b => {
      if (parseFloat(b.dataset.min) === minMag) b.classList.add('active');
      b.addEventListener('click', () => {
        minMag = parseFloat(b.dataset.min);
        [...document.querySelectorAll('.fpill')].forEach(x => x.classList.toggle('active', x === b));
        if (selected >= 0 && quakes[selected] && quakes[selected].mag < minMag) { selected = -1; paused = false; hideCard(); }
      });
    });

    // ---------- timeline ----------
    const rangeEl = $('tl-range');
    rangeEl.addEventListener('input', () => {
      scrub = rangeEl.value / 1000; playing = false; updatePlay(); updateTLabel();
      if (selected >= 0 && quakes[selected] && quakes[selected].time > cutoff()) { selected = -1; paused = false; hideCard(); }
    });
    $('tl-play').addEventListener('click', () => {
      if (playing) { playing = false; }
      else { if (scrub >= 0.999) scrub = 0; playing = true; }
      updatePlay(); updateTLabel();
    });

    // ---------- language ----------
    function setLang(code) {
      lang = code; T = TR[code]; S = SHARE[code];
      try { localStorage.setItem('globe-lang', code); } catch (e) {}
      document.documentElement.lang = code;
      document.documentElement.dir = T.dir;
      applyStaticText();
      renderStats(); renderLatest();
      if (selected >= 0) { renderCard(); positionCard(); }
      [...document.querySelectorAll('.pill')].forEach(p => p.classList.toggle('active', p.dataset.code === code));
    }
    const bar = $('langbar');
    ORDER.forEach(code => {
      const b = document.createElement('button');
      b.className = 'pill'; b.dataset.code = code; b.textContent = TR[code].name;
      b.addEventListener('click', () => setLang(code));
      bar.appendChild(b);
    });

    setInterval(() => { renderLatest(); if (selected >= 0) $('c-ago').textContent = agoText(quakes[selected].time); }, 30000);
    setLang(lang);
  })();
  </script>
</body>
</html>
